<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directory — Seismic School ID</title>
    <meta name="description"
        content="The Magnitudes Were Here — a ranked directory of all registered members, sorted by Magnitude Level.">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navigation -->
    <nav class="nav">
        <a href="index.html" class="nav-logo">Seismic</a>
        <div class="nav-links">
            <a href="register.html">Register</a>
            <a href="directory.html" class="active">Directory</a>
            <button class="sound-toggle" id="sound-toggle" title="Toggle sound">🔇</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="directory-container">

            <header class="directory-header">
                <h1>THE MAGNITUDES WERE HERE</h1>
                <p class="directory-description">
                    This is our shared memory.<br>
                    So if you are here, leave your mark.<br>
                    Let it be known — you were here.
                </p>
            </header>

            <!-- Scroll Prompt Overlay (shown when redirected from registration) -->
            <div class="scroll-prompt-overlay hidden" id="scroll-prompt">
                <div class="scroll-prompt-box">
                    <img src="prompt-icon.png" class="prompt-icon" alt="Seismic prompt">
                    <div class="prompt-text">Your inscription awaits...</div>
                    <div class="prompt-sub">Click the scroll to reveal the directory</div>
                </div>
            </div>

            <!-- Ancient Scroll with Rollers and Corner Ornaments -->
            <div class="scroll-wrapper" id="scroll-wrapper">
                <!-- Top Roller -->
                <div class="scroll-roller scroll-roller-top"></div>

                <!-- Scroll Unroll Container -->
                <div class="scroll-container">
                    <!-- Parchment Body -->
                    <div class="scroll-parchment">
                        <!-- Corner Ornaments -->
                        <div class="scroll-corner scroll-corner-tl">✦</div>
                        <div class="scroll-corner scroll-corner-tr">✦</div>
                        <div class="scroll-corner scroll-corner-bl">✦</div>
                        <div class="scroll-corner scroll-corner-br">✦</div>

                        <!-- Parchment Content -->
                        <div class="directory-list" id="directory-list">
                            <!-- Populated by app.js -->
                        </div>
                    </div>
                </div>

                <!-- Bottom Roller -->
                <div class="scroll-roller scroll-roller-bottom"></div>
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>

</html>
